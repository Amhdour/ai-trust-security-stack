name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax compile check
        run: |
          python -m compileall adapters telemetry tests launch-gate

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run core unit tests
        run: |
          pytest -q tests/retrieval tests/sandbox tests/secrets tests/tools

  adapter-tests:
    name: adapter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run adapter and observability tests
        run: |
          pytest -q tests/adapter tests/observability

  telemetry-schema-tests:
    name: telemetry schema tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run telemetry tests
        run: |
          pytest -q tests/telemetry

  policy-tests:
    name: policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: Run Rego policy tests
        run: |
          opa test policies/rego policies/tests -v
          opa test policies/retrieval -v

  launch-gate-smoke-test:
    name: launch-gate smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run launch-gate tests
        run: |
          pytest -q tests/launch-gate
