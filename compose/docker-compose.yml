services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - trust_stack

  vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["vault", "server", "-dev"]
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - vault_data:/vault/file
    networks:
      - trust_stack

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - trust_stack

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://langfuse:langfuse@db:5432/langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - trust_stack

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - trust_stack

  superset:
    image: apache/superset:4.1.1
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - superset_home:/app/superset_home
    command: ["/bin/sh", "-c", "superset db upgrade && superset fab create-admin --username ${SUPERSET_ADMIN_USER:-admin} --firstname Dev --lastname Admin --email dev@example.com --password ${SUPERSET_ADMIN_PASSWORD} && superset init && superset run -h 0.0.0.0 -p 8088"]
    networks:
      - trust_stack

networks:
  trust_stack:
    name: trust_stack

volumes:
  keycloak_data:
  vault_data:
  qdrant_data:
  grafana_data:
  superset_home:
